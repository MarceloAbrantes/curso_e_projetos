<!DOCTYPE html>
<html>
    <head>
    <title>HTML BASE</title>
    </head>
    <body>
      <h1>Titulo do site (principal) </h1>
      <h3>novo titulo</h3>  

      <p>paragrafo</p>
      <br/> <!-- quebra de linha -->
      <p>paragrafo 2</p>
      <hr/> <!-- #linha horizontal dividindo -->
      <p>paragrafo 3</p>

      <!-- link -->
      <a href="https://google.com.br">google</a> <!-- atributo -->
      <br/>
      <a href="https://google.com" target="_blank">google aba</a> <!--abrir nova aba-->
      <br/>

      <!-- imagem -->
      <img src="img/cadeira.png"/>
      <!-- atributo alt (importante p/ recomendação site/imagem perdida e etc)-->
      <img src="img/cadeira2.png" alt="cadeira numero 2">

      <!-- listas nao ordenadas -->
      <ul>
        <li>hardware</li>
        <li>software</li>
        <li>perifericos</li>
      </ul>
      <!-- lista ordenada (ex:passo a passo)-->
      <ol>
        <li>ferver</li>
        <li>assar</li>
        <li>fritar</li>
      </ol>

      <!-- tabelas -->
      <!-- table cria tabela, tr cria linha, th cria o cabeçalho, td os dados-->
      <table>
        <tr>
          <th>ID:</th>
          <th>Nome:</th>
          <th>Profissão:</th>
        </tr>
        <tr>
          <td>1</td>
          <td>marcelo</td>
          <td>eng</td>
        </tr>
        <td>2</td>
        <td>fulano</td>
        <td>programador</td>
        <tr>
        <td>3</td>
        <td>ciclano</td>
        <td>padeiro</td>
        </tr>
      </table>

      <!-- tag div (divisões e seções no site)-->
      <div>
        <h2>Titulo da seção</h2>
        <p>descrição da seção</p>
        <a href="#">Saber Mais</a>
      </div>
      
      


    </body>
</html>
