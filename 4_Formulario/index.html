<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Formulários</title>
    <link rel="stylesheet" href="css/styles.css">
</head>
<body>
    <h2>Formulários HTML</h2>
    <!-- 1 Formulario e atributos do formulario e inputs -->
    <form action="register.php" method="get">
        <div>
        <label>Nome:</label>
        <input type="text">
        </div>

        <!-- atributo name / atributo for em label -->
        <div>
            <label for="age">Idade:</label>
            <input type="text" name="age">
        </div>

        <!-- select (input para selecionar lista)-->
        <div>
            <label for="job">Selecione a sua profissão:</label>
            <select name="job">
                <option value="programador">Programador</option>
                <option value="tester">Tester/QA</option>
                <option value="devops">DevOps</option>
            </select>
        </div>

        <!-- atributo selected -->
        <div>
            <label for="contract">Você leu os termos do contrato?</label>
            <select name="contract">
                <option value="sim">Sim</option>
                <!-- selected no option deixa a opção setada quando a pessoa entra na pagina -->
                <option value="nao" selected>Não</option>
            </select>
        </div>

        <!-- multiplas seleções -->
        <div>
            <label for="items">Selecione os itens desejador:</label>
            <!-- atributo multiple dentro do select para fazer multiplas seleções -->
            <select name="Itens" multiple>
                <option value="pera">Pera</option>
                <option value="maca">Maçã</option>
                <option value="banana">Banana</option>
                <option value="abacaxi">Abacaxi</option>
            </select>
        </div>

        <!-- textarea (input maior de texto) -->
        <div>
            <label for="comment">Escreva abaixo o que você achou do post</label>
            <textarea name="comment"></textarea>
        </div>

        <!-- fieldset e legend (Agrupar input) -->
        <div>
            <fieldset>
                <legend>Preencha as suas informações</legend>
                <label for="firstname">Nome:</label>
                <input type="text" name="firstname">
                <label for="lastname">Sobrenome</label>
                <input type="text" name="lastname">
            </fieldset>
        </div>

        <!-- datalist -->
        <!-- pode escolher ou digitar o seu além de pesquisar -->
        <div>
            <label for="flavor">Escolha o sabor:</label>
            <input type="text" list="flavors" name="flavor">
            <datalist id="flavors">
                <option value="Cereja"></option>
                <option value="Morango"></option>
                <option value="Chocolate"></option>
                <option value="Abacaxi"></option>
            </datalist>
        </div>

        <!-- input para senha (atributo password) -->
        <div>
            <label for="password">Digite sua Senha</label>
            <input type="password" name="password">
        </div>

        <!-- radio button -->
        <div>
            <label for="car_model">Escolha o modelo do seu carro:</label>
            <div class="radio">
                <input type="radio" value="bmw" name="car_model">
                <label for="bmw">BMW</label>
            </div>
            <div class="radio">
                <input type="radio" value="ferrari" name="car_model">
                <label for="ferrari">Ferrari</label>
            </div>
            <div class="radio">
                <input type="radio" value="renault" name="car_model">
                <label for="renault">Renault</label>
            </div>
        </div>

        <!-- checkbox input (tem a opção de selecionar e cancelar a seleção)-->
        <div>
            <label for="optionals">Opcionais</label>
            <div class="radio">
                <input type="checkbox" name="optionals[]" value="big_tires">
                <label for="big_tires">Pneus Grandes</label>
            </div>
            <div class="radio">
                <input type="checkbox" name="optionals[]" value="turbo_engine">
                <label for="turbo_engine">Motor Turbo</label>
            </div>
            <div class="radio">
                <input type="checkbox" name="optionals[]" value="hybrid">
                <label for="hybrid">Híbrido</label>
            </div>
        </div>

        <!-- input de data -->
        <div>
            <label for="birthday">Data de nascimento:</label>
            <input type="date" name="birthday">
        </div>

        <!-- input de arquivos -->
        <div>
            <label for="image">Insira sua imagem:</label>
            <input type="file" name="image">
        </div>

        <!-- input especifico para numeros -->
        <div>
            <label for="salary">Qual sua pretenção salarial?</label>
            <input type="number" name="salary">
        </div>

        <!-- input para e-mails -->
        <div>
            <label for="email">Digite seu e-mail:</label>
            <input type="email" name="email">
        </div>

        <!-- atributo value (valor pré-preenchido)-->
        <div>
            <label for="value">Digite algum valor:</label>
            <input type="text" value="O meu valor é este 2" name="value">
        </div>

        <!-- Atributo disabled (bloquear algum input) -->
        <div>
            <p>Tente mudar o valor:</p>
            <input type="text" value="Não precisa preencher" disabled>
        </div>
        
        <!-- Atributo placeholder (dicas para usuário) -->
        <div>
            <label for="currentjob">Digite sua profissão</label>
            <input type="text" name="currentjob" placeholder="No que você está trabalhando agora?">
        </div>

        <!-- atributo required (obrigatoriedade de preenchimento de um campo) -->
        <div>
            <label for="birthyear">Ano Nascimento:</label>
            <input type="text" placeholder="Digite o ano que nasceu" required>
        </div>

        <!-- reiniciando o form (reset)-->
        <input type="reset" value="Limpar">

        <!-- botão para o envio formulário -->
        <input type="submit" value="Enviar">
    </form>
</body>
</html>
